<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>marquee and font element</title>
</head>
<body>
    <h2>Marquee Tag</h2>

    
    <marquee behavior="slide" direction="left">Hello World</marquee>

    <marquee behavior="alternate" direction="right"><img src="../images/image2.webp" alt="hill"></marquee>

    <marquee behavior="scroll" direction="up" scrollamount="1" height="100px">Hello</marquee>

    <h2>font element</h2>
    <font size="5" face="verdana" color="blue">HTML</font>



</body>
</html>
