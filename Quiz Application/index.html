<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Application</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="main-container">
      <div class="questions">
        <span id="question-number"></span>
        <h3 id="question"></h3>
      </div>

      <div class="option-container">
        <ul>
          <li>
            <input type="radio" id="option1" name="option" />
            <label for="option1" id="a"></label>
          </li>
          <li>
            <input type="radio" id="option2" name="option" />
            <label for="option2" id="b"></label>
          </li>
          <li>
            <input type="radio" id="option3" name="option" />
            <label for="option3" id="c"></label>
          </li>
          <li>
            <input type="radio" id="option4" name="option" />
            <label for="option4" id="d"></label>
          </li>
        </ul>
      </div>

      <div class="btn">
        <button type="submit" id="submit-btn">Submit</button>
      </div>

      <h1 id="score" class="hidden">hello</h1>
    </div>

    <script src="script.js"></script>
  </body>
</html>
